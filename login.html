<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ไอ พลัส ซัพพลายส์</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 14px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background-color: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; }
        .switch-link { display: inline-block; margin-top: 20px; font-size: 14px; color: #2563eb; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 เข้าสู่ระบบจัดการข้อมูล</h2>
    <div class="form-group">
        <label>รหัสพนักงาน (Username)</label>
        <input type="text" id="username" placeholder="เช่น EMP001">
    </div>
    <div class="form-group">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="password" placeholder="รหัสผ่านของคุณ">
    </div>
    <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    <div id="error-box" class="error-msg">❌ รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง!</div>
    <a class="switch-link" href="signin.html">👤 ยังไม่มีบัญชี? สมัครพนักงานใหม่ที่นี่</a>
</div>

<script>
    // สร้างพนักงานเริ่มต้นไว้ในเครื่องเผื่อกรณีเปิดระบบครั้งแรก
    let employees = JSON.parse(localStorage.getItem("employeesData")) || [
        { id: "EMP001", firstName: "สมชาย", lastName: "สายเสมอ", department: "คลังสินค้า", password: "1234" },
        { id: "EMP002", firstName: "สมหญิง", lastName: "จริงใจ", department: "บัญชี", password: "1234" }
    ];
    localStorage.setItem("employeesData", JSON.stringify(employees));

    function checkLogin() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();
        if(!user || !pass) return;

        // ค้นหาพนักงานจากความจำในเครื่องเครื่องตัวเอง
        const emp = employees.find(e => e.id === user);

        if (emp && emp.password === pass) {
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("currentUser", JSON.stringify(emp));
            window.location.href = "index.html";
        } else {
            document.getElementById("error-box").style.display = "block";
        }
    }
</script>
</body>
</html>
